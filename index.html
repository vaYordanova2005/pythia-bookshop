<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pythia Bookshop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="logo-band">
        <button class="logo-wrap" type="button" data-page-link="home" aria-label="Go to homepage">
          <svg class="logo-mark" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pythia logo: temple with cute snake reading a book">
            <!-- TEMPLE -->
            <rect x="20" y="178" width="260" height="8" rx="2" fill="#C4922A" opacity=".65"/>
            <rect x="28" y="170" width="244" height="8" rx="2" fill="#C4922A" opacity=".75"/>
            <rect x="18" y="104" width="264" height="14" rx="2" fill="#C4922A"/>
            <rect x="30"  y="107" width="10" height="8" rx="1" fill="#8B6914" opacity=".7"/>
            <rect x="60"  y="107" width="10" height="8" rx="1" fill="#8B6914" opacity=".7"/>
            <rect x="220" y="107" width="10" height="8" rx="1" fill="#8B6914" opacity=".7"/>
            <rect x="258" y="107" width="10" height="8" rx="1" fill="#8B6914" opacity=".7"/>
            <polygon points="14,104 150,28 286,104" fill="#D4A853"/>
            <polygon points="22,104 150,36 278,104" fill="#C4922A" opacity=".25"/>
            <circle cx="150" cy="30" r="4" fill="#FFEAB0"/>
            <!-- Left column -->
            <rect x="22"  y="118" width="22" height="52" rx="3" fill="#C4922A"/>
            <rect x="20"  y="114" width="26" height="6"  rx="2" fill="#D4A853"/>
            <rect x="20"  y="168" width="26" height="5"  rx="2" fill="#D4A853"/>
            <line x1="27" y1="118" x2="27" y2="170" stroke="#8B6914" stroke-width=".8" opacity=".5"/>
            <line x1="31" y1="118" x2="31" y2="170" stroke="#8B6914" stroke-width=".8" opacity=".5"/>
            <line x1="35" y1="118" x2="35" y2="170" stroke="#8B6914" stroke-width=".8" opacity=".5"/>
            <!-- Right column -->
            <rect x="256" y="118" width="22" height="52" rx="3" fill="#C4922A"/>
            <rect x="254" y="114" width="26" height="6"  rx="2" fill="#D4A853"/>
            <rect x="254" y="168" width="26" height="5"  rx="2" fill="#D4A853"/>
            <line x1="261" y1="118" x2="261" y2="170" stroke="#8B6914" stroke-width=".8" opacity=".5"/>
            <line x1="265" y1="118" x2="265" y2="170" stroke="#8B6914" stroke-width=".8" opacity=".5"/>
            <line x1="269" y1="118" x2="269" y2="170" stroke="#8B6914" stroke-width=".8" opacity=".5"/>

            <!-- SNAKE — cute, round, green, sitting in front of temple -->
            <!-- Body coil / base -->
            <ellipse cx="150" cy="174" rx="72" ry="16" fill="#6ab86a" stroke="#3d7a3d" stroke-width="1.5"/>
            <!-- Body lower -->
            <ellipse cx="150" cy="155" rx="50" ry="22" fill="#72c472" stroke="#3d7a3d" stroke-width="1.5"/>
            <!-- Neck -->
            <rect x="132" y="116" width="36" height="42" rx="18" fill="#72c472" stroke="#3d7a3d" stroke-width="1.5"/>
            <!-- Head — large, round, cute -->
            <ellipse cx="150" cy="108" rx="36" ry="30" fill="#7ecf7e" stroke="#3d7a3d" stroke-width="1.8"/>
            <!-- Cheek blush -->
            <ellipse cx="124" cy="115" rx="9" ry="6" fill="#ff9999" opacity=".38"/>
            <ellipse cx="176" cy="115" rx="9" ry="6" fill="#ff9999" opacity=".38"/>
            <!-- Head spot -->
            <ellipse cx="150" cy="84" rx="10" ry="6" fill="#5a9e5a"/>
            <!-- Body spots -->
            <ellipse cx="118" cy="158" rx="10" ry="7" fill="#5a9e5a"/>
            <ellipse cx="183" cy="162" rx="9"  ry="6" fill="#5a9e5a"/>
            <ellipse cx="150" cy="148" rx="7"  ry="5" fill="#5a9e5a"/>
            <!-- Eyes -->
            <circle cx="136" cy="104" r="9"  fill="white" stroke="#3d7a3d" stroke-width="1"/>
            <circle cx="164" cy="104" r="9"  fill="white" stroke="#3d7a3d" stroke-width="1"/>
            <circle cx="137" cy="105" r="5"  fill="#1a1a1a"/>
            <circle cx="165" cy="105" r="5"  fill="#1a1a1a"/>
            <!-- Eye sparkles -->
            <circle cx="139" cy="102" r="1.8" fill="white"/>
            <circle cx="167" cy="102" r="1.8" fill="white"/>
            <!-- Nostrils -->
            <circle cx="146" cy="114" r="1.5" fill="#3d7a3d"/>
            <circle cx="154" cy="114" r="1.5" fill="#3d7a3d"/>
            <!-- Smile -->
            <path d="M140 120 Q150 128 160 120" stroke="#3d7a3d" stroke-width="2" fill="none" stroke-linecap="round"/>
            <!-- Tail tips -->
            <path d="M82 172 Q66 162 70 178"  stroke="#5a9e5a" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M218 172 Q234 162 230 178" stroke="#5a9e5a" stroke-width="4" fill="none" stroke-linecap="round"/>

            <!-- OPEN BOOK -->
            <path d="M80 148 C104 136 126 140 148 156 L148 196 C124 182 102 181 80 190 Z" fill="#FFF8DC" stroke="#C4922A" stroke-width="1.5"/>
            <path d="M220 148 C196 136 174 140 152 156 L152 196 C176 182 198 181 220 190 Z" fill="#FFF2BC" stroke="#C4922A" stroke-width="1.5"/>
            <path d="M148 156 Q150 162 152 156 L152 196 Q150 190 148 196 Z" fill="#9E7920"/>
            <!-- Text lines -->
            <line x1="94"  y1="162" x2="140" y2="172" stroke="#C4922A" stroke-width="1"  opacity=".55"/>
            <line x1="92"  y1="170" x2="140" y2="180" stroke="#C4922A" stroke-width=".8" opacity=".45"/>
            <line x1="91"  y1="178" x2="139" y2="188" stroke="#C4922A" stroke-width=".8" opacity=".40"/>
            <line x1="160" y1="172" x2="208" y2="162" stroke="#C4922A" stroke-width="1"  opacity=".55"/>
            <line x1="160" y1="180" x2="208" y2="170" stroke="#C4922A" stroke-width=".8" opacity=".45"/>
            <line x1="160" y1="188" x2="207" y2="178" stroke="#C4922A" stroke-width=".8" opacity=".40"/>
          </svg>
          <span class="logo-text">
            <strong>PYTHIA</strong>
            <small>Your oracle of stories</small>
          </span>
        </button>
      </header>

      <nav class="genre-band" aria-label="Genres">
        <button class="genre-main-btn" type="button" data-toggle="genre-menu">Genres</button>
        <span class="sep">|</span>
        <button class="qgenre active" type="button" data-genre="all">All</button>
        <button class="qgenre" type="button" data-genre="Science Fiction">Sci-Fi</button>
        <button class="qgenre" type="button" data-genre="Horror">Horror</button>
        <button class="qgenre" type="button" data-genre="Romance">Romance</button>
        <button class="qgenre" type="button" data-genre="Mystery">Mystery</button>
        <button class="qgenre" type="button" data-genre="History">History</button>
        <div class="genre-dd" data-genre-menu></div>
      </nav>

      <section class="search-band" aria-label="Search books">
        <input class="search-inp" type="search" data-search placeholder="Search by title, author, genre..." />
        <button class="search-btn" type="button" data-search-button>Search</button>
      </section>

      <nav class="nav-band" aria-label="Main pages">
        <button class="nav-band-btn" type="button" data-page-link="profile">Profile</button>
        <button class="nav-band-btn" type="button" data-page-link="favorites">Favorites</button>
        <button class="nav-band-btn" type="button" data-page-link="community">Community</button>
        <button class="nav-band-btn" type="button" data-page-link="orders">📦 Orders</button>
        <button class="nav-band-btn" type="button" data-page-link="cart">Cart <span class="cart-badge" data-cart-count>0</span></button>
      </nav>

      <main>
        <section id="page-home" class="page active">
          <div class="books-area">
            <div class="books-top">
              <div>
                <p class="section-kicker">Featured catalogue</p>
                <h1>Books for curious readers</h1>
              </div>
              <button class="filter-btn" type="button" data-toggle="filter-panel">Filters</button>
            </div>
            <aside class="filter-panel" data-filter-panel>
              <label>Price min <input type="number" min="0" data-price-min value="0" /></label>
              <label>Price max <input type="number" min="0" data-price-max value="100" /></label>
              <label>Year
                <select data-year-filter>
                  <option value="all">All</option>
                  <option value="2024">2024</option>
                  <option value="2023">2023</option>
                  <option value="2022">2022</option>
                  <option value="older">Older</option>
                </select>
              </label>
              <label>Sort
                <select data-sort>
                  <option value="popular">Most popular</option>
                  <option value="new">Newest</option>
                  <option value="price-asc">Price ascending</option>
                  <option value="price-desc">Price descending</option>
                </select>
              </label>
            </aside>
            <div class="books-grid" data-books-grid></div>
          </div>
        </section>

        <section id="page-detail" class="page">
          <div class="detail">
            <button class="back-btn" type="button" data-page-link="home">Back</button>
            <div data-detail-content></div>
          </div>
        </section>

        <section id="page-cart" class="page">
          <div class="cart-pg">
            <button class="back-btn" type="button" data-page-link="home">Back</button>
            <h1 class="cart-title">Cart</h1>
            <div data-cart-items></div>
            <div data-cart-summary></div>
          </div>
        </section>

        <section id="page-checkout" class="page">
          <div class="checkout-pg">
            <button class="back-btn" type="button" data-page-link="home">Back</button>
            <form class="checkout-form" data-checkout-form>
              <div>
                <p class="section-kicker">Order details</p>
                <h1>Checkout</h1>
              </div>
              <div class="checkout-grid">
                <label>Full name <input name="name" required placeholder="Jane Reader" /></label>
                <label>Email <input name="email" type="email" required placeholder="jane@example.com" /></label>
                <label>City <input name="city" required placeholder="Sofia" /></label>
                <label>Street / district <input name="street" required placeholder="Book Lane" /></label>
                <label>Number <input name="number" required placeholder="12A" /></label>
                <label>Payment method
                  <select name="payment" required>
                    <option value="card">Card</option>
                    <option value="cash_on_delivery">Cash on delivery</option>
                    <option value="bank_transfer">Bank transfer</option>
                  </select>
                </label>
              </div>
              <label class="check-line"><input type="checkbox" name="invoice" /> I need an invoice</label>
              <label class="promo-line">Discount code <input data-promo-code placeholder="BOOK10" /></label>
              <button class="co-btn" type="button" data-apply-promo>Apply code</button>
              <div class="checkout-summary" data-checkout-summary></div>
              <button class="co-btn" type="submit">Place order</button>
              <p class="form-message" data-order-message></p>
            </form>
          </div>
        </section>

        <!-- ORDERS HISTORY -->
        <section id="page-orders" class="page">
          <div class="orders-pg">
            <button class="back-btn" type="button" data-page-link="home">← Back</button>
            <h1 class="orders-title">📦 My Orders</h1>
            <div data-orders-list></div>
          </div>
        </section>

        <section id="page-community" class="page">
          <div class="comm-pg">
            <button class="back-btn" type="button" data-page-link="home">Back</button>
            <h1 class="comm-title">Community chat</h1>
            <div class="chat-box" data-chat-box></div>
            <div class="chat-row">
              <input class="chat-in" data-chat-input placeholder="Write a message..." />
              <button class="csend" type="button" data-send-chat>Send</button>
            </div>
          </div>
        </section>

        <section id="page-favorites" class="page">
          <div class="favs-pg">
            <button class="back-btn" type="button" data-page-link="home">Back</button>
            <h1 class="favs-title">Favorite books</h1>
            <div class="books-grid" data-favorites-grid></div>
          </div>
        </section>

        <section id="page-profile" class="page">
          <div class="prof-pg">
            <button class="back-btn" type="button" data-page-link="home">Back</button>
            <h1 class="prof-title">Profile</h1>
            <div class="prof-card">
              <div class="auth-tabs" data-auth-tabs>
                <button class="auth-tab active" type="button" data-auth-tab="signin">Sign in</button>
                <button class="auth-tab" type="button" data-auth-tab="signup">Sign up</button>
              </div>

              <form class="auth-form" data-signin-form>
                <h2>Sign in</h2>
                <label>Email <input name="email" type="email" required placeholder="reader@example.com" /></label>
                <label>Password <input name="password" type="password" required placeholder="Password" /></label>
                <button class="co-btn" type="submit">Sign in</button>
                <p class="form-message" data-signin-message></p>
              </form>

              <form class="auth-form hidden" data-signup-form>
                <h2>Create account</h2>
                <label>Username <input name="username" required placeholder="reader123" /></label>
                <label>Full name <input name="fullName" required placeholder="Jane Reader" /></label>
                <label>Email <input name="email" type="email" required placeholder="jane@example.com" /></label>
                <label>Password <input name="password" type="password" minlength="6" required placeholder="At least 6 characters" /></label>
                <label>Account type
                  <select name="role" required>
                    <option value="client">Client</option>
                    <option value="seller">Seller</option>
                  </select>
                </label>
                <button class="co-btn" type="submit">Sign up</button>
                <p class="form-message" data-signup-message></p>
              </form>

              <section class="profile-panel hidden" data-profile-panel>
                <div class="profile-head">
                  <div class="avatar" data-profile-avatar>S</div>
                  <div>
                    <h2 data-profile-name>Reader</h2>
                    <p class="muted" data-profile-email>reader@example.com</p>
                    <span class="role-pill" data-profile-role>Client</span>
                  </div>
                </div>
                <button class="small-btn" type="button" data-signout>Sign out</button>
                <div class="role-box">
                  <h2>Permissions</h2>
                  <ul data-role-permissions></ul>
                </div>
                <form class="seller-form" data-book-form>
                  <h2>Add a book</h2>
                  <input name="title" placeholder="Title" required />
                  <input name="author" placeholder="Author" required />
                  <input name="genre" placeholder="Genre" required />
                  <input name="year" type="number" placeholder="Year" required />
                  <input name="price" type="number" min="1" step="0.01" placeholder="Price EUR" required />
                  <input name="coverUrl" type="url" placeholder="Cover image URL (optional)" />
                  <textarea name="description" placeholder="Description"></textarea>
                  <button class="co-btn" type="submit">Add book</button>
                </form>
              </section>
            </div>
          </div>
        </section>
      </main>
      <!-- Order success modal -->
      <div class="order-modal-overlay" id="order-modal" aria-modal="true" role="dialog" aria-label="Order placed">
        <div class="order-modal-box">
          <div class="order-modal-check">✓</div>
          <h2 class="order-modal-title">Order placed!</h2>
          <p class="order-modal-sub" id="order-modal-sub"></p>
          <p class="order-modal-email" id="order-modal-email"></p>
          <button class="co-btn order-modal-btn" id="order-modal-close">Continue shopping</button>
        </div>
      </div>

      <div class="toast" data-toast></div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
